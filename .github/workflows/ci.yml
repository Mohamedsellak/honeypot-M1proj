name: honeypot-ci
on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install ruff bandit pytest jsonschema
      - name: Lint (ruff)
        run: ruff check .
      - name: SAST (bandit)
        run: bandit -r honeypots analyzer common shipper -ll -x tests
      - name: Generate dataset
        run: python datasets/gen_dataset.py
      - name: Tests (pytest)
        run: pytest -q

  build-scan:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
      - name: Trivy scan (SSH image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: honeypot-m1spro-honeypot-ssh:latest
          severity: CRITICAL,HIGH
          exit-code: "0"
